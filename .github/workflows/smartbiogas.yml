name: Smart Biogas to ThingSpeak

on:
  schedule:
    # Runs at minute 00, 20 and 40 of every hour, in UTC
    - cron: "0,20,40 * * * *"

  # Allows manual testing from the GitHub Actions tab
  workflow_dispatch:

concurrency:
  group: smartbiogas-thingspeak-sync
  cancel-in-progress: false

jobs:
  sync-smartbiogas:
    runs-on: ubuntu-latest

    # Prevent a failed request from running indefinitely
    timeout-minutes: 10

    steps:
      - name: Download repository files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show synchronized UTC time
        run: |
          echo "GitHub runner UTC time:"
          date -u

      - name: Run Smart Biogas to ThingSpeak bridge
        env:
          SMARTBIOGAS_API_KEY: ${{ secrets.SMARTBIOGAS_API_KEY }}
          THINGSPEAK_WRITE_KEY: ${{ secrets.THINGSPEAK_WRITE_KEY }}
          THINGSPEAK_CHANNEL_ID: ${{ secrets.THINGSPEAK_CHANNEL_ID }}
          THINGSPEAK_READ_KEY: ${{ secrets.THINGSPEAK_READ_KEY }}
          METER_ID: ${{ secrets.METER_ID }}
        run: python biogas1.py
